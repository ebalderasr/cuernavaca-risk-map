<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVICUE - Observatorio de Cuernavaca</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div id="info-panel">
        <h1>OVICUE</h1>
        <p><strong>Observatorio de Violencia e Incidencia en Cuernavaca</strong></p>
        <hr>
        <div id="legend">
            <p><span class="dot red"></span> Nivel 7-10: Crítico</p>
            <p><span class="dot orange"></span> Nivel 4-6: Riesgo</p>
            <p><span class="dot yellow"></span> Nivel 1-3: Precaución</p>
        </div>
        <p class="disclaimer">
            Este mapa es estrictamente informativo. Datos basados en reportes periodísticos. 
            No es una fuente oficial.
        </p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
