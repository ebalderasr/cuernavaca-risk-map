name: Reclasificar eventos

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reclassify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 geopy geopandas shapely pyproj

      - name: Reclasificar eventos existentes
        run: python scripts/reclassify_events.py

      - name: Regenerar capas del mapa
        run: python scripts/logic.py

      - name: Commit y push cambios
        run: |
          git config --global user.name "OVICUE Bot"
          git config --global user.email "bot@ovicue.local"
          git add data/events.json data/unresolved_events.json data/map_layers.json data/archive_points.json
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "Admin: reclasificar eventos con nueva lógica"
            git push
          fi
