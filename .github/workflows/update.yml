name: OVICUE Daily Update

on:
  schedule:
    # 17:12 UTC ~= 11:12 AM CDMX (UTC-06:00)
    - cron: '12 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests beautifulsoup4 google-genai geopy geopandas shapely pyproj

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Run scraper
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/scraper.py

      - name: Run geo logic
        run: python scripts/logic.py

      - name: Commit and push changes
        run: |
          git config --global user.name "OVICUE Bot"
          git config --global user.email "bot@ovicue.local"
          git add data/events.json data/map_layers.json data/geocode_cache.json
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "Auto-update: datos OVICUE"
            git push
          fi